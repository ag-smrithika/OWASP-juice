<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWASP Juice Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
   <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: #4a4a4a;
            border-radius: 12px;
            padding: 48px 40px 40px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #fff;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 28px;
            color: #ffffff;
        }

        label {
            display: none; /* Juice Shop uses placeholder-only, no visible labels */
        }

        input {
            width: 100%;
            padding: 18px 16px;
            background: #5a5a5a;
            border: 1px solid #6a6a6a;
            border-radius: 6px;
            color: #ccc;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        input::placeholder { color: #aaa; }
        input:focus {
            outline: none;
            border-color: #888;
            background: #626262;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.78rem;
            min-height: 18px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #6b8fa3;
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        </style>
    <body>
  <div class="card">
    <h2>Juice Shop Login</h2>
 
    <label for="email">Email</label>
    <input type="text" id="email" placeholder="user@example.com" autocomplete="off" />
    <div class="error" id="emailError"></div>
 
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min. 8 characters" />
    <div class="error" id="passwordError"></div>
 
    <button onclick="handleLogin()">Login</button>
    <div id="successMsg">Login successful (client-side demo)</div>
  </div>
 
    </body>
</head>
<body>
